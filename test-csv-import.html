<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Import Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .warning { color: #dcdcaa; }
        pre { background: #252526; padding: 10px; border-radius: 4px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 10px 0; cursor: pointer; }
    </style>
</head>
<body>
    <h1>CSV Import Skills Test</h1>
    <div id="output"></div>
    
    <script src="skills/base-skill.js"></script>
    <script src="skills/sla-calculator-skill.js"></script>
    <script src="skills/classification-skill.js"></script>
    <script src="skills/grouping-skill.js"></script>
    <script src="skills/poam-builder-skill.js"></script>
    <script src="skills/search-skill.js"></script>
    <script src="skills/skill-orchestrator.js"></script>
    <script src="skills-integration.js"></script>
    
    <script>
        const output = document.getElementById('output');
        
        function log(msg, type = 'info') {
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : type === 'warning' ? 'warning' : '';
            output.innerHTML += `<div class="${className}">${msg}</div>`;
        }
        
        async function testCSVImport() {
            log('🧪 Starting CSV Import Test\n', 'warning');
            
            // Sample CSV data matching Qualys format
            const sampleFindings = [
                {
                    title: 'Microsoft Windows KB5034441 Security Update',
                    host: 'server01.test.local',
                    ip: '10.1.1.100',
                    severity: '5',
                    risk: 'critical',
                    status: 'Active',
                    solution: 'Install KB5034441 from Microsoft Update.',
                    qid: ['91234'],
                    cve: ['CVE-2024-21351'],
                    firstDetected: '2024-01-15',
                    lastDetected: '2024-03-11',
                    operatingSystem: 'Windows Server 2019',
                    os: 'Windows Server 2019'
                },
                {
                    title: 'Apache Tomcat 9.0.85 or Earlier Multiple Vulnerabilities',
                    host: 'webserver01.test.local',
                    ip: '10.1.1.103',
                    severity: '4',
                    risk: 'high',
                    status: 'Active',
                    solution: 'Upgrade to Apache Tomcat 9.0.86 or later.',
                    qid: ['92456'],
                    cve: ['CVE-2024-23672'],
                    firstDetected: '2024-02-01',
                    lastDetected: '2024-03-11',
                    operatingSystem: 'Windows Server 2019',
                    os: 'Windows Server 2019'
                }
            ];
            
            log(`📋 Sample findings: ${sampleFindings.length}`, 'info');
            
            try {
                // Initialize skills
                log('\n🔧 Initializing skills architecture...', 'info');
                await window.skillsIntegration.init();
                log('✅ Skills initialized', 'success');
                
                // Step 1: Classification
                log('\n📋 Step 1: Classification', 'warning');
                const classificationSkill = window.skillsIntegration.orchestrator.skills.get('classification');
                const classResult = await classificationSkill.execute({ findings: sampleFindings });
                
                if (!classResult.success) {
                    log('❌ Classification failed: ' + classResult.errors.join(', '), 'error');
                    return;
                }
                
                const classified = classResult.data.findings;
                log(`✅ Classified ${classified.length} findings`, 'success');
                
                // Check first finding
                const firstFinding = classified[0];
                log(`\n🔍 First finding remediation check:`, 'info');
                log(`   Has remediation object: ${firstFinding.remediation ? '✅ YES' : '❌ NO'}`, firstFinding.remediation ? 'success' : 'error');
                
                if (firstFinding.remediation) {
                    log(`   Component: ${firstFinding.remediation.component}`, 'info');
                    log(`   Type: ${firstFinding.remediation.remediationType}`, 'info');
                    log(`   Platform: ${firstFinding.remediation.platform}`, 'info');
                    log(`   Target: ${firstFinding.remediation.fixedTarget}`, 'info');
                } else {
                    log('❌ CRITICAL: Classification did not add remediation object!', 'error');
                    return;
                }
                
                // Step 2: Grouping
                log('\n📋 Step 2: Grouping', 'warning');
                const groupingSkill = window.skillsIntegration.orchestrator.skills.get('grouping');
                const groupResult = await groupingSkill.execute({ findings: classified });
                
                if (!groupResult.success) {
                    log('❌ Grouping failed: ' + groupResult.errors.join(', '), 'error');
                    return;
                }
                
                const groups = groupResult.data.groups;
                log(`✅ Created ${groups.length} groups`, 'success');
                
                // Check first group
                const firstGroup = groups[0];
                log(`\n🔍 First group remediation check:`, 'info');
                log(`   Has remediation object: ${firstGroup.remediation ? '✅ YES' : '❌ NO'}`, firstGroup.remediation ? 'success' : 'error');
                
                if (firstGroup.remediation) {
                    log(`   Component: ${firstGroup.remediation.component}`, 'info');
                    log(`   Type: ${firstGroup.remediation.remediationType}`, 'info');
                    log(`   Platform: ${firstGroup.remediation.platform}`, 'info');
                } else {
                    log('❌ CRITICAL: Grouping did not preserve remediation object!', 'error');
                    log(`   Group keys: ${Object.keys(firstGroup).join(', ')}`, 'info');
                    return;
                }
                
                // Step 3: Map Conversion (simulate pipeline)
                log('\n📋 Step 3: Map Conversion (Pipeline)', 'warning');
                const groupsMap = new Map();
                groups.forEach((group, idx) => {
                    if (group && group.signature) {
                        const groupWithSets = {
                            ...group,
                            assets: new Set(group.assets || []),
                            cves: new Set(group.cves || []),
                            qids: new Set(group.qids || []),
                            advisoryIds: new Set()
                        };
                        groupsMap.set(group.signature, groupWithSets);
                    }
                });
                
                log(`✅ Converted to Map: ${groupsMap.size} groups`, 'success');
                
                const firstMapGroup = groupsMap.values().next().value;
                log(`\n🔍 First map group remediation check:`, 'info');
                log(`   Has remediation object: ${firstMapGroup.remediation ? '✅ YES' : '❌ NO'}`, firstMapGroup.remediation ? 'success' : 'error');
                
                if (firstMapGroup.remediation) {
                    log(`   Component: ${firstMapGroup.remediation.component}`, 'info');
                    log(`   Type: ${firstMapGroup.remediation.remediationType}`, 'info');
                } else {
                    log('❌ CRITICAL: Remediation lost during Map conversion!', 'error');
                    return;
                }
                
                log('\n✅ ALL TESTS PASSED - Skills architecture is working correctly!', 'success');
                
            } catch (error) {
                log(`\n❌ Test failed with error: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
            }
        }
        
        // Auto-run test
        window.addEventListener('load', () => {
            setTimeout(testCSVImport, 1000);
        });
    </script>
</body>
</html>
