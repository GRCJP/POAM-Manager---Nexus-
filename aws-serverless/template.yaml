AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: POAM Nexus Serverless Infrastructure

# Global configuration for all Lambda functions
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        DYNAMODB_TABLE_POAMS: !Ref POAMsTable
        DYNAMODB_TABLE_SYSTEMS: !Ref SystemsTable
        DYNAMODB_TABLE_USERS: !Ref UsersTable
        DYNAMODB_TABLE_SCANS: !Ref ScansTable
        DYNAMODB_TABLE_WORKBOOK: !Ref WorkbookTable
        JWT_SECRET: !Ref JWTSecret
        STAGE: !Ref Stage
    Tracing: Active
    Layers:
      - !Ref DependenciesLayer

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment stage
  
  JWTSecret:
    Type: String
    NoEcho: true
    Description: Secret key for JWT token signing
    Default: change-this-in-production

Resources:
  # ============================================================================
  # DYNAMODB TABLES
  # ============================================================================
  
  POAMsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub poam-nexus-poams-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: systemId
          AttributeType: S
        - AttributeName: remediationSignature
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: systemId-index
          KeySchema:
            - AttributeName: systemId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: remediationSignature-index
          KeySchema:
            - AttributeName: remediationSignature
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: status-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: POAM-Nexus
        - Key: Stage
          Value: !Ref Stage

  SystemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub poam-nexus-systems-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: organizationId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: organizationId-index
          KeySchema:
            - AttributeName: organizationId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: POAM-Nexus

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub poam-nexus-users-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: organizationId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: organizationId-index
          KeySchema:
            - AttributeName: organizationId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: POAM-Nexus

  ScansTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub poam-nexus-scans-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: systemId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: systemId-index
          KeySchema:
            - AttributeName: systemId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: POAM-Nexus

  WorkbookTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub poam-nexus-workbook-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: systemId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: systemId-index
          KeySchema:
            - AttributeName: systemId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: POAM-Nexus

  # ============================================================================
  # LAMBDA LAYER (Shared Dependencies)
  # ============================================================================
  
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub poam-nexus-dependencies-${Stage}
      Description: Shared Node.js dependencies (AWS SDK, bcrypt, jsonwebtoken)
      ContentUri: lambda/layers/dependencies/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Retain

  # ============================================================================
  # LAMBDA FUNCTIONS - Authentication
  # ============================================================================
  
  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub poam-nexus-auth-login-${Stage}
      CodeUri: lambda/auth/
      Handler: login.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        LoginApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /auth/login
            Method: POST

  AuthRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub poam-nexus-auth-register-${Stage}
      CodeUri: lambda/auth/
      Handler: register.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        RegisterApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /auth/register
            Method: POST

  # ============================================================================
  # LAMBDA FUNCTIONS - POAMs
  # ============================================================================
  
  GetPOAMsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub poam-nexus-get-poams-${Stage}
      CodeUri: lambda/poams/
      Handler: get.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref POAMsTable
      Events:
        GetPOAMsApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /poams
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  CreatePOAMFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub poam-nexus-create-poam-${Stage}
      CodeUri: lambda/poams/
      Handler: create.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref POAMsTable
      Events:
        CreatePOAMApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /poams
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  UpdatePOAMFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub poam-nexus-update-poam-${Stage}
      CodeUri: lambda/poams/
      Handler: update.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref POAMsTable
      Events:
        UpdatePOAMApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /poams/{id}
            Method: PUT
            Auth:
              Authorizer: CognitoAuthorizer

  # ============================================================================
  # LAMBDA FUNCTIONS - Systems
  # ============================================================================
  
  GetSystemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub poam-nexus-get-systems-${Stage}
      CodeUri: lambda/systems/
      Handler: get.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SystemsTable
      Events:
        GetSystemsApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /systems
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  CreateSystemFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub poam-nexus-create-system-${Stage}
      CodeUri: lambda/systems/
      Handler: create.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SystemsTable
      Events:
        CreateSystemApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /systems
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  # ============================================================================
  # LAMBDA FUNCTIONS - Workbook
  # ============================================================================
  
  GetWorkbookItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub poam-nexus-get-workbook-${Stage}
      CodeUri: lambda/workbook/
      Handler: get.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WorkbookTable
      Events:
        GetWorkbookApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /workbook
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  # ============================================================================
  # API GATEWAY
  # ============================================================================
  
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub poam-nexus-api-${Stage}
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: /*
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true

  # ============================================================================
  # COGNITO USER POOL (Authentication)
  # ============================================================================
  
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub poam-nexus-users-${Stage}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          Required: true
          Mutable: false
        - Name: given_name
          Required: false
          Mutable: true
        - Name: family_name
          Required: false
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      MfaConfiguration: OPTIONAL
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      UserPoolTags:
        Application: POAM-Nexus

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub poam-nexus-web-client-${Stage}
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  # ============================================================================
  # S3 BUCKET (Frontend Hosting)
  # ============================================================================
  
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub poam-nexus-frontend-${Stage}-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Application
          Value: POAM-Nexus

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ============================================================================
  # CLOUDFRONT DISTRIBUTION (CDN)
  # ============================================================================
  
  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub poam-nexus-oac-${Stage}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
      Tags:
        - Key: Application
          Value: POAM-Nexus

  # ============================================================================
  # EVENTBRIDGE RULES (Automation)
  # ============================================================================
  
  DailyReportRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub poam-nexus-daily-report-${Stage}
      Description: Trigger daily POAM status report
      ScheduleExpression: cron(0 8 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt DailyReportFunction.Arn
          Id: DailyReportTarget

  DailyReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub poam-nexus-daily-report-${Stage}
      CodeUri: lambda/automation/
      Handler: daily-report.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref POAMsTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt NotificationTopic.TopicName

  DailyReportPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DailyReportFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyReportRule.Arn

  # ============================================================================
  # SNS TOPIC (Notifications)
  # ============================================================================
  
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub poam-nexus-notifications-${Stage}
      DisplayName: POAM Nexus Notifications
      Tags:
        - Key: Application
          Value: POAM-Nexus

  # ============================================================================
  # CLOUDWATCH LOG GROUPS
  # ============================================================================
  
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/poam-nexus-${Stage}
      RetentionInDays: 30

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
    Export:
      Name: !Sub ${AWS::StackName}-ApiEndpoint

  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontURL

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolId

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolClientId

  FrontendBucketName:
    Description: S3 bucket for frontend hosting
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub ${AWS::StackName}-FrontendBucket
